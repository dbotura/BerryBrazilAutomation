<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Required</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #f8fbfb 0%, #e8f0f2 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
      }
      .card {
        width: min(92vw, 360px);
        background: #ffffff;
        border: 1px solid #dbe5e7;
        border-radius: 14px;
        padding: 1.25rem;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 0.4rem;
        font-size: 1.15rem;
      }
      p {
        margin: 0 0 1rem;
        color: #5a6773;
        font-size: 0.92rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5df;
        border-radius: 10px;
        padding: 0.72rem 0.8rem;
        font-size: 0.95rem;
      }
      button {
        width: 100%;
        margin-top: 0.65rem;
        border: none;
        border-radius: 10px;
        padding: 0.75rem 0.8rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: #0f6f68;
        cursor: pointer;
      }
      .error {
        min-height: 1rem;
        margin-top: 0.55rem;
        color: #b91c1c;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Enter Password</h1>
      <p>Access to this forecast environment is restricted.</p>
      <form id="auth-form">
        <input id="password" type="password" autocomplete="current-password" placeholder="Password" required />
        <button type="submit">Unlock</button>
      </form>
      <div class="error" id="error"></div>
    </main>
    <script>
      const form = document.getElementById('auth-form')
      const passwordInput = document.getElementById('password')
      const errorEl = document.getElementById('error')
      const nextPath = new URLSearchParams(window.location.search).get('next') || '/'

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        errorEl.textContent = ''
        try {
          const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: passwordInput.value, next: nextPath }),
          })

          const payload = await response.json().catch(() => ({}))
          if (!response.ok) {
            errorEl.textContent = payload.error || 'Invalid password'
            return
          }

          window.location.replace(payload.redirectTo || '/')
        } catch {
          errorEl.textContent = 'Unable to validate password right now'
        }
      })
    </script>
  </body>
</html>
